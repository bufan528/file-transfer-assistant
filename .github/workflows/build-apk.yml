name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install "flet[cli]>=0.21.0"

      - name: Build APK
        run: flet build apk --project main.py

      - name: Find APK files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la build/apk/release/*.apk 2>/dev/null || ls -la build/**/*.apk 2>/dev/null || echo "No APK in build dir"
          ls -la *.apk 2>/dev/null || echo "No APK in root"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-transfer-assistant-apk
          path: |
            **/*.apk
          retention-days: 30
          if-no-files-found: warn