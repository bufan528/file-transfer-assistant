name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install "flet[cli]>=0.21.0"

      - name: Build APK
        run: flet pack apk main.py

      - name: Find and rename APK
        run: |
          find . -name "*.apk" 2>/dev/null | head -1 | xargs -I{} mv {} file-transfer-assistant.apk 2>/dev/null || true
          ls -la *.apk 2>/dev/null || echo "No APK found in root"
          find . -name "*.apk" 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-transfer-assistant-apk
          path: "**/*.apk"
          retention-days: 30