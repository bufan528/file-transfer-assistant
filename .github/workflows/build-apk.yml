name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: flet build apk main.py

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-transfer-assistant-apk
          path: build/apk/release/*.apk
          retention-days: 30